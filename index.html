<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfectly Normal Games</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a0033 0%, #330066 50%, #1a0033 100%);
      color: #00ff00;
      font-family: "Courier New", monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 28px;
    }

    .container {
      width: min(92vw, 1000px);
      min-height: 88vh;
      background: #000;
      border: 4px solid #00ff00;
      box-shadow: 0 0 16px #00ff00, inset 0 0 14px rgba(0, 255, 0, 0.1);
      border-radius: 8px;
      padding: clamp(24px, 5vw, 54px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 34px;
      text-align: center;
    }

    h1 {
      font-size: clamp(2rem, 7vw, 5rem);
      line-height: 0.95;
      letter-spacing: 4px;
      color: #00ff00;
      text-shadow: 0 0 10px #00ff00, 0 0 18px #00ff00;
    }

    .intro {
      width: min(90%, 760px);
      border: 2px solid #ff00ff;
      background: rgba(255, 0, 255, 0.08);
      box-shadow: 0 0 8px #ff00ff;
      padding: clamp(18px, 4vw, 30px);
      color: #00ffff;
      font-size: clamp(1rem, 2.4vw, 1.45rem);
      line-height: 1.5;
      text-shadow: 0 0 7px #00ffff;
    }

    .intro span {
      display: block;
      margin-top: 18px;
      color: #ffff00;
      text-shadow: 0 0 7px #ffff00;
    }

    .games {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .game-title {
      font-size: clamp(1.1rem, 2.8vw, 1.7rem);
      color: #ff00ff;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-shadow: 0 0 9px #ff00ff;
    }

    .game-card {
      width: min(90vw, 640px);
      min-height: 220px;
      border: 3px solid #00ff00;
      background:
        linear-gradient(rgba(0, 255, 0, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 0, 0.08) 1px, transparent 1px),
        #1a1a1a;
      background-size: 20px 20px;
      box-shadow: 0 0 14px rgba(0, 255, 0, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: inherit;
      position: relative;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .game-card:hover {
      transform: scale(1.02);
      box-shadow: 0 0 20px #00ff00;
    }

    .preview {
      display: flex;
      align-items: center;
      gap: 60px;
    }

    .snake {
      display: flex;
      align-items: center;
    }

    .snake-head {
      width: 44px;
      height: 44px;
      position: relative;
      box-shadow: 0 0 10px currentColor;
    }

    .snake-head.green {
      background: #00ff00;
      color: #00ff00;
    }

    .snake-head.yellow {
      background: #ffff00;
      color: #ffff00;
    }

    .snake-head::after {
      content: "";
      position: absolute;
      width: 9px;
      height: 9px;
      background: #000;
      top: 12px;
      right: 10px;
    }

    .fruit-row {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .empty-block {
      width: 20px;
      height: 20px;
      border: 1px solid rgba(0, 255, 0, 0.35);
    }

    .fruit {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #ff00ff;
      box-shadow: 0 0 10px #ff00ff;
    }

    .click-text {
      position: absolute;
      bottom: 16px;
      font-size: 0.95rem;
      color: #00ffff;
      letter-spacing: 2px;
      text-shadow: 0 0 6px #00ffff;
    }

    footer {
      color: #ff00ff;
      font-size: 0.8rem;
      letter-spacing: 1px;
      text-shadow: 0 0 6px #ff00ff;
    }

    @media (max-width: 650px) {
      body {
        padding: 14px;
      }

      .container {
        min-height: 94vh;
        gap: 26px;
      }

      .game-card {
        min-height: 190px;
      }

      .preview {
        gap: 28px;
      }

      .snake-head {
        width: 34px;
        height: 34px;
      }

      .snake-head::after {
        width: 7px;
        height: 7px;
        top: 9px;
        right: 8px;
      }

      .fruit-row {
        gap: 12px;
      }

      .empty-block {
        width: 16px;
        height: 16px;
      }

      .fruit {
        width: 22px;
        height: 22px;
      }
    }
  </style>
</head>

<body>
  <main class="container">
    <h1>PERFECTLY<br>NORMAL<br>GAMES</h1>

    <section class="intro">
      <p>Hi, I'm Alex Guevara. I'm just starting out.</p>
      <span>These are some Perfectly Normal Games.</span>
    </section>

    <section class="games">
      <div class="game-title">Perfectly Normal Snake</div>

      <a class="game-card" href="/snake/" aria-label="Play Perfectly Normal Snake">
        <div class="preview">
          <div class="snake">
            <div class="snake-head green"></div>
            <div class="snake-head yellow"></div>
          </div>

          <div class="fruit-row">
            <div class="empty-block"></div>
            <div class="empty-block"></div>
            <div class="empty-block"></div>
            <div class="fruit"></div>
          </div>
        </div>

        <div class="click-text">CLICK TO PLAY</div>
      </a>
    </section>

    <footer>© Perfectly Normal Games</footer>
  </main>
</body>
</html>
